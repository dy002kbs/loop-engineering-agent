name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Run tests
        run: python -m pytest -q
      - name: Compile source, examples, and tests
        run: python -m compileall -q src examples tests
      - name: CLI trace and LangSmith dry-run smoke
        run: |
          loop-agent --trace-jsonl .traces/ci-smoke.jsonl "CI smoke task"
          loop-agent --analyze-jsonl .traces/ci-smoke.jsonl
          loop-agent --export-langsmith-jsonl .traces/ci-smoke.jsonl \
            --langsmith-project loop-engineering-agent-ci \
            --langsmith-dry-run-jsonl .traces/ci-langsmith-payloads.jsonl
          python - <<'PY'
          import json
          from pathlib import Path

          payloads = [json.loads(line) for line in Path('.traces/ci-langsmith-payloads.jsonl').read_text().splitlines()]
          assert payloads
          assert payloads[0]['project_name'] == 'loop-engineering-agent-ci'
          assert 'loop_engineering_trace' in payloads[0]['extra']
          PY
      - name: Example smoke tests
        run: |
          python examples/docs_agent_demo.py
          python examples/llm_judge_demo.py
          python examples/langchain_adapter_demo.py
      - name: FastAPI app smoke
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from examples.server_app import app

          client = TestClient(app)
          assert client.get('/health').status_code == 200
          webhook = client.post('/webhooks/slack.message', json={'text': 'CI smoke'})
          assert webhook.status_code == 200
          assert webhook.json()['passed'] is True
          cron = client.post('/cron/nightly-docs/run')
          assert cron.status_code == 200
          assert cron.json()['passed'] is True
          PY
